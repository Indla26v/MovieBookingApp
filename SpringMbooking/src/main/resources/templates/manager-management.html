<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manager Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; min-height: 100vh;
        }

        /* Navbar from admin-dashboard */
        .navbar { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); padding: 1rem 2rem; box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1); }
        .nav-content { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .nav-links { display: flex; gap: 1.5rem; }
        .nav-link { color: #ffffff; text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-link:hover { color: #adb5bd; }
        .logout-btn { background: linear-gradient(45deg, #ff6b6b, #ee5a24); color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 25px; cursor: pointer; transition: all 0.3s ease; font-weight: 500; }
        .logout-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(238, 90, 36, 0.4); }

        .container {
            max-width: 1200px; margin: 2rem auto; padding: 2.5rem;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        h1 { color: #333; margin-bottom: 2rem; font-size: 2.5rem; font-weight: 700; text-align: center; }

        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08); }
        table { width: 100%; border-collapse: collapse; }
        th { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem; text-align: left; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; }
        td { padding: 1rem; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:hover { background: #f8f9fa; }

        .action-btn {
            padding: 0.5rem 1rem; border: none; border-radius: 20px; cursor: pointer;
            font-size: 0.8rem; font-weight: 500; transition: all 0.3s ease; margin-right: 0.5rem;
            display: inline-flex; align-items: center; gap: 0.3rem;
        }
        .btn-edit { background: #feca57; color: #2c2c54; }
        .btn-delete { background: #ff6b6b; color: white; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 3px 10px rgba(0,0,0,0.2); }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 10% auto; padding: 2rem; border-radius: 20px; width: 500px; max-width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-title { font-size: 1.5rem; font-weight: 600; color: #333; }
        .close-btn { background: none; border: none; font-size: 1.5rem; color: #999; cursor: pointer; transition: color 0.3s ease; }
        .close-btn:hover { color: #333; }

        /* Form elements from assign-movie */
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333; }
        .form-input { width: 100%; padding: 1rem; border: 2px solid #ddd; border-radius: 15px; font-size: 1rem; transition: all 0.3s ease; box-sizing: border-box; }
        .form-input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .submit-btn { background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; padding: 1rem; border-radius: 15px; cursor: pointer; font-weight: 600; font-size: 1rem; width: 100%; }

    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-content">
        <div class="nav-links">
            <a th:href="@{/}" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a th:href="@{/admin}" class="nav-link"><i class="fas fa-arrow-left"></i> Back to Admin Panel</a>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </form>
    </div>
</nav>

<div class="container">
    <h1><i class="fas fa-user-tie"></i> Manager Management</h1>
    <p th:if="${message}" class="success-message" th:text="${message}"></p>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th><i class="fas fa-id-badge"></i> ID</th>
                <th><i class="fas fa-user"></i> Username</th>
                <th><i class="fas fa-envelope"></i> Email</th>
                <th><i class="fas fa-building"></i> Assigned Theatres</th>
                <th><i class="fas fa-cogs"></i> Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="manager : ${managers}">
                <td th:text="${manager.id}"></td>
                <td th:text="${manager.username}"></td>
                <td th:text="${manager.email}"></td>
                <td>
                    <span th:if="${#lists.isEmpty(managerTheatresMap.get(manager.id))}">None</span>
                    <ul style="list-style: none; padding: 0; margin: 0;">
                        <li th:each="theatre : ${managerTheatresMap.get(manager.id)}" th:text="${theatre.name}"></li>
                    </ul>
                </td>
                <td>
                    <button class="action-btn btn-edit" th:onclick="'showEditModal(\'' + ${manager.id} + '\', \'' + ${manager.username} + '\', \'' + ${manager.email} + '\', \'' + ${#strings.listJoin(managerTheatresMap.get(manager.id).![id], ',')} + '\')'"><i class="fas fa-edit"></i> Edit</button>
                    <form th:action="@{'/admin/managers/' + ${manager.id} + '/delete'}" method="post" style="display:inline;">
                        <button type="submit" class="action-btn btn-delete" onclick="return confirm('Are you sure?')"><i class="fas fa-trash"></i> Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">Edit Manager</h2>
            <button class="close-btn">&times;</button>
        </div>
        <form th:action="@{/admin/managers/update}" method="post" th:object="${managerUpdateDto}">
            <input type="hidden" id="managerId" name="id">

            <div class="form-group">
                <label for="editUsername" class="form-label">Username:</label>
                <input type="text" id="editUsername" name="username" class="form-input" required>
            </div>

            <div class="form-group">
                <label for="editEmail" class="form-label">Email:</label>
                <input type="email" id="editEmail" name="email" class="form-input" required>
            </div>

            <div class="form-group">
                <label for="theatreIds" class="form-label">Assigned Theatres (Hold Ctrl/Cmd to select multiple):</label>
                <select id="theatreIds" name="theatreIds" class="form-input" multiple="multiple" style="height: 150px;">
                    <option th:each="theatre : ${allTheatres}" th:value="${theatre.id}" th:text="${theatre.name} + ' (' + ${theatre.location} + ')'"></option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Save Changes</button>
        </form>
    </div>
</div>

<script>
    const modal = document.getElementById('editModal');
    const closeBtn = modal.querySelector('.close-btn');

    function showEditModal(id, username, email, assignedTheatreIds) {
        document.getElementById('managerId').value = id;
        document.getElementById('editUsername').value = username;
        document.getElementById('editEmail').value = email;

        const theatreSelect = document.getElementById('theatreIds');
        const assignedIds = assignedTheatreIds.split(',').map(Number);

        for (let i = 0; i < theatreSelect.options.length; i++) {
            theatreSelect.options[i].selected = assignedIds.includes(Number(theatreSelect.options[i].value));
        }

        modal.style.display = 'block';
    }

    closeBtn.onclick = function() { modal.style.display = 'none'; }
    window.onclick = function(event) {
        if (event.target == modal) { modal.style.display = 'none'; }
    }
</script>

</body>
</html>
