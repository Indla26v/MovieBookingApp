<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        min-height: 100vh;
    }

    .navbar {
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        padding: 1rem 2rem;
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
    }

    .nav-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1200px;
        margin: 0 auto;
    }

    .nav-links {
        display: flex;
        gap: 1.5rem;
    }

    .nav-link {
        color: #ffffff;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s;
    }

    .nav-link:hover {
        color: #adb5bd;
    }

    .logout-btn {
        background: linear-gradient(45deg, #ff6b6b, #ee5a24);
        color: white;
        border: none;
        padding: 0.5rem 1.5rem;
        border-radius: 25px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
    }
    .logout-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(238, 90, 36, 0.4);
    }

    .container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 2rem;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
    }

    h1 {
        color: #333;
        margin-bottom: 0.5rem;
        font-size: 2.5rem;
        font-weight: 700;
    }

    p {
        color: #666;
        margin-bottom: 2.5rem;
        font-size: 1.1rem;
    }

    .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        margin-top: 1rem;
    }

    .dashboard-card {
        background: white;
        padding: 2rem;
        text-decoration: none;
        border-radius: 15px;
        transition: all 0.3s ease;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        position: relative;
        overflow: hidden;
    }

    .dashboard-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(45deg, #667eea, #764ba2);
        transform: scaleX(0);
        transition: transform 0.4s ease;
    }

    .dashboard-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }

    .dashboard-card:hover::before {
        transform: scaleX(1);
    }

    .card-icon {
        font-size: 2.5rem;
        color: #667eea;
        margin-bottom: 1rem;
        display: block;
    }

    .card-title {
        color: #333;
        font-weight: 600;
        font-size: 1.2rem;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-content">
    <div class="nav-links">
      <a th:href="@{/}" class="nav-link"><i class="fas fa-home"></i> Home</a>
      <a th:href="@{/dashboard}" class="nav-link"><i class="fas fa-tachometer-alt"></i> User Dashboard</a>
      <a th:href="@{/admin}" class="nav-link"><strong><i class="fas fa-cogs"></i> Admin Panel</strong></a>
    </div>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </form>
  </div>
</nav>

<div class="container">
  <h1><i class="fas fa-user-shield"></i> Admin Dashboard</h1>
  <p>Welcome to the central management hub. You are logged in with administrative privileges.</p>

  <div class="dashboard-grid">
    <a th:href="@{/admin/movies}" class="dashboard-card">
      <i class="fas fa-film card-icon"></i>
      <span class="card-title">Manage Movies</span>
    </a>
    <a th:href="@{/admin/users}" class="dashboard-card">
      <i class="fas fa-users-cog card-icon"></i>
      <span class="card-title">Manage Users</span>
    </a>
    <a th:href="@{/admin/theatres}" class="dashboard-card">
      <i class="fas fa-building card-icon"></i>
      <span class="card-title">Manage Theatres</span>
    </a>
    <a th:href="@{/admin/managers}" class="dashboard-card">
      <i class="fas fa-user-tie card-icon"></i>
      <span class="card-title">Manage Managers</span>
    </a>
    <a th:href="@{/admin/register/admin}" class="dashboard-card">
      <i class="fas fa-user-plus card-icon"></i>
      <span class="card-title">Register New Admin</span>
    </a>
  </div>
</div>

</body>
</html>
