<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <title>Login - Movie Booking</title>
  <meta charset="UTF-8">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
    }
    .login-container {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        padding: 3rem;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        max-width: 400px;
        width: 100%;
        text-align: center;
    }
    h1 { color: #333; margin-bottom: 0.5rem; font-weight: 700; }
    p { color: #666; margin-bottom: 2rem; }
    .form-group { position: relative; margin-bottom: 1.5rem; }
    .form-input {
        width: 100%;
        padding: 1rem 1rem 1rem 3rem;
        border: 2px solid #ddd;
        border-radius: 15px;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }
    .form-input:focus {
        outline: none; border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .input-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #aaa;
    }
    .btn {
        width: 100%; padding: 1rem; border: none;
        border-radius: 15px; font-size: 1.1rem; font-weight: 600;
        cursor: pointer; transition: all 0.3s ease;
    }
    .btn-primary {
        background: linear-gradient(45deg, #667eea, #764ba2); color: white;
    }
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }
    .divider {
        display: flex; align-items: center; text-align: center;
        color: #aaa; margin: 2rem 0;
    }
    .divider::before, .divider::after {
        content: ''; flex: 1; border-bottom: 1px solid #ddd;
    }
    .divider:not(:empty)::before { margin-right: .25em; }
    .divider:not(:empty)::after { margin-left: .25em; }
    .oauth-button {
        background: #fff; color: #333;
        border: 2px solid #ddd;
        display: flex; align-items: center; justify-content: center;
        gap: 0.5rem; text-decoration: none;
    }
    .oauth-button:hover { background-color: #f8f8f8; }
    .extra-links { margin-top: 1.5rem; font-size: 0.9rem; }
    .extra-links a { color: #667eea; text-decoration: none; }
  </style>
</head>
<body>
<div class="login-container">
  <h1>Welcome Back!</h1>
  <p>Please log in to continue</p>

  <div th:if="${param.error}" class="alert alert-danger" style="color: red; margin-bottom: 1rem;">
    Invalid username or password.
  </div>
  <div th:if="${param.logout}" class="alert alert-success" style="color: green; margin-bottom: 1rem;">
    You have been logged out.
  </div>

  <form th:action="@{/login}" method="post">
    <div class="form-group">
      <i class="fas fa-user input-icon"></i>
      <input type="text" name="username" class="form-input" placeholder="Username" required />
    </div>
    <div class="form-group">
      <i class="fas fa-lock input-icon"></i>
      <input type="password" name="password" class="form-input" placeholder="Password" required />
    </div>
    <button type="submit" class="btn btn-primary">Login</button>
  </form>

  <div class="divider">OR</div>

  <a th:href="@{/oauth2/authorization/google}" class="btn oauth-button">
    <i class="fab fa-google"></i> Sign in with Google
  </a>

  <div class="extra-links">
    Don't have an account? <a th:href="@{/register}">Register here</a>
  </div>
</div>
</body>
</html>
