<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <title>Login - Movie Booking</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial; text-align: center; padding-top: 80px; background: #f9f9f9; }
    form { display: inline-block; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px #ccc; }
    input { display: block; margin: 10px auto; padding: 10px; width: 250px; }
    .oauth-button {
        display: block;
        margin: 10px auto;
        padding: 10px;
        width: 250px;
        background-color: #db4437; /* Google red */
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        text-decoration: none; /* For the <a> tag */
        line-height: 1.5; /* Align text vertically */
    }
    .oauth-button:hover {
        background-color: #c33d2e;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Login</h1>
  <form th:action="@{/login}" method="post">
    <input type="text" name="username" placeholder="Username" required />
    <input type="password" name="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>

  <p style="margin-top: 20px;">OR</p>

  <!-- Google Sign-In Button -->
  <a th:href="@{/oauth2/authorization/google}" class="oauth-button">
    Sign in with Google
  </a>
</div>
</body>
</html>
