<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <title>Login - Movie Booking</title>
  <meta charset="UTF-8">
  <style>
    /* Specific styles for login.html if needed, otherwise rely on style.css */
    body { font-family: Arial; text-align: center; padding-top: 80px; background: #f9f9f9; }
    form { display: inline-block; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px #ccc; }
    input { display: block; margin: 10px auto; padding: 10px; width: 250px; }
    /* Replaced .btn with common button style from style.css */
  </style>
</head>
<body>
<div class="container">
  <h1>Login</h1>
  <form th:action="@{/login}" method="post">
    <input type="text" name="username" placeholder="Username" required />
    <input type="password" name="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>
</div>
</body>
</html>
