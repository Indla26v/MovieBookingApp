<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <title>Movie Management</title>
  <style>
    /* Specific styles for movie.html if needed, otherwise rely on style.css */
    body { font-family: Arial; margin: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background-color: #f2f2f2; }
    form { margin-top: 30px; }
    input[type="text"], input[type="number"] {
        width: 300px; padding: 8px; margin: 5px 0;
    }
    /* Replaced button style with common button style from style.css */
  </style>
</head>
<body>

<nav class="navbar">
  <a th:href="@{/}">Home</a>
  <a th:href="@{/dashboard}">Dashboard</a>
  <a th:href="@{/auth/admin/movies}">Movie Management</a>
  <form th:action="@{/logout}" method="post" style="display: inline;">
    <button type="submit" style="background: none; border: none; color: white; cursor: pointer; font-size: 1em; margin-left: 1rem;">Logout</button>
  </form>
</nav>

<div class="container">
  <h1>Movie Management (Admin Panel)</h1>

  <h2>Add New Movie</h2>
  <form th:action="@{/auth/admin/movies}" method="post">
    <label>Title:</label><br>
    <input type="text" name="title" required><br>

    <label>Language:</label><br>
    <input type="text" name="language" required><br>

    <label>Rating:</label><br>
    <input type="number" step="0.1" name="rating" min="0" max="10" required><br>

    <button type="submit">Add Movie</button>
  </form>

  <h2>All Movies</h2>
  <table>
    <thead>
    <tr>
      <th>Title</th>
      <th>Language</th>
      <th>Rating</th>
      <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="movie : ${movies}">
      <td th:text="${movie.title}"></td>
      <td th:text="${movie.language}"></td>
      <td th:text="${movie.rating}"></td>
      <td>
        <form th:action="@{'/auth/admin/movies/' + ${movie.id}}" method="post">
          <input type="hidden" name="_method" value="delete"/>
          <button type="submit" onclick="return confirm('Are you sure to delete this movie?')">Delete</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>
</div>

</body>
</html>
