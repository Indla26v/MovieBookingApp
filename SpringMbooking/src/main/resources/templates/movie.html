<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Movie Management</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        min-height: 100vh;
    }

    .navbar {
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        padding: 1rem 0;
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
    }

    .nav-content {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2rem;
    }

    .nav-links {
        display: flex;
        gap: 2rem;
    }

    .nav-link {
        color: #ffffff;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
        position: relative;
    }

    .nav-link:hover {
        color: #64b5f6;
        transform: translateY(-2px);
    }

    .nav-link::after {
        content: '';
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 0;
        height: 2px;
        background: #64b5f6;
        transition: width 0.3s ease;
    }

    .nav-link:hover::after {
        width: 100%;
    }

    .logout-btn {
        background: linear-gradient(45deg, #ff6b6b, #ee5a24);
        color: white;
        border: none;
        padding: 0.5rem 1.5rem;
        border-radius: 25px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
    }

    .logout-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(238, 90, 36, 0.4);
    }

    .container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 2rem;
    }

    .page-header {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 2rem;
        margin-bottom: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
    }

    .page-title {
        color: #333;
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
    }

    .page-subtitle {
        color: #666;
        font-size: 1.1rem;
    }

    .content-grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 2rem;
    }

    .add-movie-section {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        height: fit-content;
    }

    .section-title {
        color: #333;
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #333;
    }

    .form-input {
        width: 100%;
        padding: 1rem;
        border: 2px solid #eee;
        border-radius: 15px;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    .form-input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-primary {
        background: linear-gradient(45deg, #667eea, #764ba2);
        color: white;
        border: none;
        padding: 1rem 2rem;
        border-radius: 25px;
        cursor: pointer;
        font-weight: 600;
        font-size: 1rem;
        width: 100%;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .movies-list-section {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .search-box {
        width: 100%;
        padding: 1rem;
        border: 2px solid #eee;
        border-radius: 25px;
        font-size: 1rem;
        margin-bottom: 1.5rem;
        transition: all 0.3s ease;
    }

    .search-box:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .movies-grid {
        display: grid;
        gap: 1rem;
    }

    .movie-card {
        background: white;
        border-radius: 15px;
        padding: 1.5rem;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        transition: all 0.3s ease;
        position: relative;
    }

    .movie-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
    }

    .movie-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1rem;
    }

    .movie-title {
        font-size: 1.3rem;
        font-weight: 700;
        color: #333;
        margin: 0;
        flex: 1;
    }

    .movie-actions {
        display: flex;
        gap: 0.5rem;
    }

    .btn-sm {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 500;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 0.3rem;
    }

    .btn-edit {
        background: #feca57;
        color: #2c2c54;
    }

    .btn-edit:hover {
        background: #ff9f43;
        transform: translateY(-2px);
    }

    .btn-delete {
        background: #ff6b6b;
        color: white;
    }

    .btn-delete:hover {
        background: #ee5a24;
        transform: translateY(-2px);
    }

    .movie-details {
        display: flex;
        gap: 1rem;
        align-items: center;
    }

    .movie-language {
        background: #e3f2fd;
        color: #1976d2;
        padding: 0.3rem 0.8rem;
        border-radius: 15px;
        font-size: 0.8rem;
        font-weight: 500;
    }

    .movie-rating {
        background: linear-gradient(45deg, #feca57, #ff9ff3);
        color: #2c2c54;
        padding: 0.3rem 0.8rem;
        border-radius: 15px;
        font-size: 0.8rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.2rem;
    }

    .alert {
        padding: 1rem;
        border-radius: 15px;
        margin-bottom: 1rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }

    .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }

    .empty-state {
        text-align: center;
        padding: 3rem;
        color: #666;
    }

    .empty-icon {
        font-size: 4rem;
        color: #ddd;
        margin-bottom: 1rem;
    }

    /* Edit Modal Styles */
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(5px);
    }

    .modal-content {
        background: white;
        margin: 10% auto;
        padding: 2rem;
        border-radius: 20px;
        width: 500px;
        max-width: 90%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
    }

    .modal-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: #333;
    }

    .close-btn {
        background: none;
        border: none;
        font-size: 1.5rem;
        color: #999;
        cursor: pointer;
        transition: color 0.3s ease;
    }

    .close-btn:hover {
        color: #333;
    }

    @media (max-width: 768px) {
        .content-grid {
            grid-template-columns: 1fr;
        }

        .container {
            padding: 0 1rem;
        }

        .page-title {
            font-size: 2rem;
        }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-content">
    <div class="nav-links">
      <a th:href="@{/}" class="nav-link">
        <i class="fas fa-home"></i> Home
      </a>
      <a th:href="@{/dashboard}" class="nav-link">
        <i class="fas fa-tachometer-alt"></i> Dashboard
      </a>
      <a th:href="@{/admin}" class="nav-link">
        <i class="fas fa-cog"></i> Admin Panel
      </a>
    </div>
    <form th:action="@{/logout}" method="post" style="margin: 0;">
      <button type="submit" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </form>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">
      <i class="fas fa-film"></i> Movie Management
    </h1>
    <p class="page-subtitle">Add new movies and manage your cinema's movie collection</p>
  </div>

  <div th:if="${success}" class="alert alert-success">
    <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
  </div>
  <div th:if="${error}" class="alert alert-error">
    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
  </div>

  <div class="content-grid">
    <div class="add-movie-section">
      <h2 class="section-title">
        <i class="fas fa-plus-circle"></i> Add New Movie
      </h2>

      <form th:action="@{/admin/movies}" method="post" id="addMovieForm">
        <div class="form-group">
          <label class="form-label" for="title">Movie Title</label>
          <input type="text" class="form-input" id="title" name="title" required
                 placeholder="Enter movie title">
        </div>

        <div class="form-group">
          <label class="form-label" for="language">Language</label>
          <select class="form-input" id="language" name="language" required>
            <option value="">Select Language</option>
            <option value="English">English</option>
            <option value="Hindi">Hindi</option>
            <option value="Telugu">Telugu</option>
            <option value="Tamil">Tamil</option>
            <option value="Malayalam">Malayalam</option>
            <option value="Kannada">Kannada</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="rating">Rating (0-10)</label>
          <input type="number" class="form-input" id="rating" name="rating"
                 min="0" max="10" step="0.1" required placeholder="e.g., 8.5">
        </div>

        <button type="submit" class="btn-primary">
          <i class="fas fa-plus"></i> Add Movie
        </button>
      </form>
    </div>

    <div class="movies-list-section">
      <h2 class="section-title">
        <i class="fas fa-list"></i> Movies List
      </h2>

      <input type="text" class="search-box" placeholder="Search movies..."
             id="movieSearch" onkeyup="filterMovies()">

      <div class="movies-grid" id="moviesGrid">
        <div class="movie-card" th:each="movie : ${movies}">
          <div class="movie-header">
            <h3 class="movie-title" th:text="${movie.title}">Movie Title</h3>
            <div class="movie-actions">
              <button class="btn-sm btn-edit"
                      th:onclick="'editMovie(' + ${movie.id} + ', \'' + ${movie.title} + '\', \'' + ${movie.language} + '\', ' + ${movie.rating} + ')'">
                <i class="fas fa-edit"></i> Edit
              </button>
              <form th:action="@{'/admin/movies/' + ${movie.id} + '/delete'}"
                    method="post" style="display: inline;">
                <button type="submit" class="btn-sm btn-delete"
                        onclick="return confirm('Are you sure you want to delete this movie?')">
                  <i class="fas fa-trash"></i> Delete
                </button>
              </form>
            </div>
          </div>
          <div class="movie-details">
            <span class="movie-language" th:text="${movie.language}">Language</span>
            <div class="movie-rating">
              <i class="fas fa-star"></i>
              <span th:text="${movie.rating}">Rating</span>
            </div>
          </div>
        </div>

        <div th:if="${movies == null or #lists.isEmpty(movies)}" class="empty-state">
          <div class="empty-icon">
            <i class="fas fa-film"></i>
          </div>
          <h3>No Movies Found</h3>
          <p>Start by adding your first movie above!</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Edit Movie Modal -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">Edit Movie</h2>
      <button class="close-btn" onclick="closeEditModal()">&times;</button>
    </div>

    <form id="editMovieForm" method="post">
      <div class="form-group">
        <label class="form-label" for="editTitle">Movie Title</label>
        <input type="text" class="form-input" id="editTitle" name="title" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="editLanguage">Language</label>
        <select class="form-input" id="editLanguage" name="language" required>
          <option value="English">English</option>
          <option value="Hindi">Hindi</option>
          <option value="Telugu">Telugu</option>
          <option value="Tamil">Tamil</option>
          <option value="Malayalam">Malayalam</option>
          <option value="Kannada">Kannada</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="editRating">Rating (0-10)</label>
        <input type="number" class="form-input" id="editRating" name="rating"
               min="0" max="10" step="0.1" required>
      </div>

      <button type="submit" class="btn-primary">
        <i class="fas fa-save"></i> Update Movie
      </button>
    </form>
  </div>
</div>

<script>
  function filterMovies() {
      const input = document.getElementById('movieSearch');
      const filter = input.value.toLowerCase();
      const movieCards = document.querySelectorAll('.movie-card');

      movieCards.forEach(card => {
          const title = card.querySelector('.movie-title').textContent.toLowerCase();
          const language = card.querySelector('.movie-language').textContent.toLowerCase();

          if (title.includes(filter) || language.includes(filter)) {
              card.style.display = '';
          } else {
              card.style.display = 'none';
          }
      });
  }

  function editMovie(id, title, language, rating) {
      document.getElementById('editModal').style.display = 'block';
      document.getElementById('editTitle').value = title;
      document.getElementById('editLanguage').value = language;
      document.getElementById('editRating').value = rating;
      document.getElementById('editMovieForm').action = '/admin/movies/' + id + '/update';
  }

  function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
  }

  // Close modal when clicking outside
  window.onclick = function(event) {
      const modal = document.getElementById('editModal');
      if (event.target == modal) {
          modal.style.display = 'none';
      }
  }

  // Form validation
  document.getElementById('addMovieForm').addEventListener('submit', function(e) {
      const rating = document.getElementById('rating').value;
      if (rating < 0 || rating > 10) {
          e.preventDefault();
          alert('Rating must be between 0 and 10');
      }
  });

  // Add entrance animation
  document.addEventListener('DOMContentLoaded', function() {
      const movieCards = document.querySelectorAll('.movie-card');
      movieCards.forEach((card, index) => {
          card.style.opacity = '0';
          card.style.transform = 'translateY(20px)';

          setTimeout(() => {
              card.style.transition = 'all 0.5s ease';
              card.style.opacity = '1';
              card.style.transform = 'translateY(0)';
          }, index * 100);
      });
  });
</script>

</body>
</html>
