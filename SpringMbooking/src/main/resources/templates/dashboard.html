<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
  <a th:href="@{/}">Home</a>
  <a th:href="@{/dashboard}">Dashboard</a>
  <form th:action="@{/logout}" method="post" style="display: inline;">
    <button type="submit" style="background: none; border: none; color: white; cursor: pointer; font-size: 1em; margin-left: 1rem;">Logout</button>
  </form>
</nav>

<div class="container">
  <h1>Welcome, <span th:text="${username}">User</span>!</h1>

  <h2>Nearby Theatres</h2>
  <ul>
    <li th:each="theatre : ${theatres}">
      <b th:text="${theatre.name}">Theatre Name</b> -
      <span th:text="${theatre.location}">Location</span>
    </li>
  </ul>
</div>

</body>
</html>
