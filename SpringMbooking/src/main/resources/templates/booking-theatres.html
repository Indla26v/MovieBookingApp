<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Select Theatre - Movie Booking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 2rem 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .movie-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .movie-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #333;
            margin: 0;
        }

        .movie-rating {
            background: linear-gradient(45deg, #4caf50, #45a049);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #666;
            margin-top: 1rem;
        }

        .breadcrumb a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .breadcrumb a:hover {
            color: #764ba2;
        }

        .theatres-container {
            display: grid;
            gap: 1.5rem;
        }

        .theatre-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .theatre-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(45deg, #667eea, #764ba2);
        }

        .theatre-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .theatre-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .theatre-info h3 {
            font-size: 1.5rem;
            color: #333;
            margin: 0 0 0.5rem 0;
            font-weight: 700;
        }

        .theatre-location {
            color: #666;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .theatre-badge {
            background: linear-gradient(45deg, #4caf50, #45a049);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .showtimes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
        }

        .showtime-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 1rem;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .showtime-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
        }

        .showtime-btn:hover::before {
            width: 200%;
            height: 200%;
        }

        .showtime-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .showtime-time {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .showtime-info {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .no-shows {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .no-shows i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #ddd;
        }

        .back-btn {
            position: fixed;
            top: 2rem;
            left: 2rem;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            color: #333;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-btn:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .floating-info {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .floating-info h4 {
            margin: 0 0 0.5rem 0;
            color: #333;
            font-size: 0.9rem;
        }

        .price-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #4caf50;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 0.5rem;
            }

            .movie-title {
                font-size: 2rem;
            }

            .theatre-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .showtimes {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 0.5rem;
            }

            .back-btn {
                top: 1rem;
                left: 1rem;
            }

            .floating-info {
                bottom: 1rem;
                right: 1rem;
                left: 1rem;
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(102, 126, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0); }
        }
    </style>
</head>
<body>

<button class="back-btn" onclick="history.back()">
    <i class="fas fa-arrow-left"></i>
</button>

<div class="container">
    <div class="header">
        <div class="movie-info">
            <h1 class="movie-title" th:text="${movie.title}">Movie Title</h1>
            <div class="movie-rating" th:if="${movie.rating}">
                <i class="fas fa-star"></i>
                <span th:text="${movie.rating}">8.5</span>
            </div>
        </div>
        <div class="breadcrumb">
            <a th:href="@{/bookings/movies}">Movies</a>
            <i class="fas fa-chevron-right"></i>
            <span>Select Theatre</span>
        </div>
    </div>

    <div class="theatres-container" th:if="${!theatreShowtimes.isEmpty()}">
        <div class="theatre-card" th:each="theatre : ${theatreShowtimes.keySet()}">
            <div class="theatre-header">
                <div class="theatre-info">
                    <h3 th:text="${theatre.name}">Theatre Name</h3>
                    <div class="theatre-location">
                        <i class="fas fa-map-marker-alt"></i>
                        <span th:text="${theatre.location}">Theatre Location</span>
                    </div>
                </div>
                <div class="theatre-badge">
                    Available Shows
                </div>
            </div>

            <div class="showtimes">
                <a th:each="showtime : ${theatreShowtimes.get(theatre)}"
                   th:href="@{/bookings/showtime/{id}/seats(id=${showtime.id})}"
                   class="showtime-btn pulse">
                    <div class="showtime-time"
                         th:text="${#temporals.format(showtime.showtime, 'HH:mm')}">
                        10:30
                    </div>
                    <div class="showtime-info">
                        <div th:text="${#temporals.format(showtime.showtime, 'MMM dd')}">Jan 15</div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <div class="no-shows" th:if="${theatreShowtimes.isEmpty()}">
        <i class="fas fa-theater-masks"></i>
        <h3>No Shows Available</h3>
        <p>Sorry, there are no upcoming shows for this movie.</p>
        <a th:href="@{/bookings/movies}" class="showtime-btn" style="display: inline-flex; margin-top: 1rem;">
            <i class="fas fa-arrow-left"></i>
            Back to Movies
        </a>
    </div>
</div>

<div class="floating-info">
    <h4><i class="fas fa-info-circle"></i> Ticket Price</h4>
    <div class="price-info">
        <i class="fas fa-rupee-sign"></i>
        <span>₹150 per seat</span>
    </div>
</div>

<script>
    // Add some interactive effects
    document.addEventListener('DOMContentLoaded', function() {
        const cards = document.querySelectorAll('.theatre-card');

        cards.forEach(card => {
            card.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-5px) scale(1.02)';
            });

            card.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0) scale(1)';
            });
        });

        // Add click sound effect (optional)
        const buttons = document.querySelectorAll('.showtime-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', function() {
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });
    });
</script>

</body>
</html>
