<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Select Seats</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        min-height: 100vh;
    }

    .navbar {
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        padding: 1rem 0;
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
    }

    .nav-content {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2rem;
    }

    .nav-brand {
        color: #64b5f6;
        font-size: 1.5rem;
        font-weight: bold;
        text-decoration: none;
    }

    .nav-links {
        display: flex;
        gap: 2rem;
    }

    .nav-link {
        color: #ffffff;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
        padding: 0.5rem 1rem;
        border-radius: 25px;
    }

    .nav-link:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
    }

    .container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 2rem;
    }

    .booking-header {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 2rem;
        margin-bottom: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
    }

    .movie-title {
        font-size: 2rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 0.5rem;
    }

    .showtime-details {
        color: #666;
        font-size: 1.1rem;
        margin-bottom: 1rem;
    }

    .theatre-info {
        background: linear-gradient(45deg, #4ecdc4, #44a08d);
        color: white;
        padding: 1rem;
        border-radius: 15px;
        display: inline-block;
    }

    .cinema-container {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
    }

    .screen {
        background: linear-gradient(45deg, #333, #666);
        color: white;
        padding: 1rem;
        margin: 0 auto 3rem;
        border-radius: 50px;
        max-width: 600px;
        font-weight: 600;
        font-size: 1.1rem;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        position: relative;
    }

    .screen::before {
        content: '';
        position: absolute;
        top: -5px;
        left: -5px;
        right: -5px;
        bottom: -5px;
        background: linear-gradient(45deg, #ffd700, #ffed4e);
        border-radius: 55px;
        z-index: -1;
    }

    .seat-map {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        max-width: 800px;
        margin: 0 auto;
    }

    .seat-row {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        align-items: center;
    }

    .row-label {
        font-weight: bold;
        color: #333;
        width: 30px;
        text-align: center;
    }

    .seat {
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
        font-size: 0.8rem;
        transition: all 0.3s ease;
        position: relative;
        margin: 2px;
    }

    .seat.available {
        background: #e8f5e8;
        color: #2d5a2d;
        border: 2px solid #4caf50;
    }

    .seat.available:hover {
        background: #c8e6c9;
        transform: scale(1.1);
        box-shadow: 0 3px 10px rgba(76, 175, 80, 0.3);
    }

    .seat.selected {
        background: linear-gradient(45deg, #667eea, #764ba2);
        color: white;
        border: 2px solid #5a67d8;
        transform: scale(1.1);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .seat.booked {
        background: #ffcccb;
        color: #d32f2f;
        border: 2px solid #f44336;
        cursor: not-allowed;
        opacity: 0.7;
    }

    .seat-legend {
        display: flex;
        justify-content: center;
        gap: 2rem;
        margin: 2rem 0;
        flex-wrap: wrap;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #333;
        font-weight: 500;
    }

    .legend-seat {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        border: 2px solid;
    }

    .booking-summary {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 2rem;
        margin-top: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        position: sticky;
        bottom: 2rem;
    }

    .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        font-size: 1.1rem;
    }

    .summary-row.total {
        font-size: 1.3rem;
        font-weight: 700;
        color: #333;
        border-top: 2px solid #eee;
        padding-top: 1rem;
        margin-top: 1rem;
    }

    .selected-seats {
        color: #667eea;
        font-weight: 600;
    }

    .confirm-btn {
        background: linear-gradient(45deg, #4caf50, #45a049);
        color: white;
        border: none;
        padding: 1rem 2rem;
        border-radius: 25px;
        cursor: pointer;
        font-weight: 600;
        font-size: 1.1rem;
        width: 100%;
        transition: all 0.3s ease;
        margin-top: 1rem;
    }

    .confirm-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
    }

    .confirm-btn:disabled {
        background: #cccccc;
        cursor: not-allowed;
    }

    .aisle {
        width: 20px;
    }

    @media (max-width: 768px) {
        .container {
            padding: 0 1rem;
        }

        .seat {
            width: 35px;
            height: 35px;
            font-size: 0.7rem;
        }

        .seat-legend {
            gap: 1rem;
        }

        .summary-row {
            font-size: 1rem;
        }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-content">
    <a th:href="@{/}" class="nav-brand">
      <i class="fas fa-film"></i> MovieBook
    </a>

    <div class="nav-links">
      <a th:href="@{/dashboard}" class="nav-link">
        <i class="fas fa-tachometer-alt"></i> Dashboard
      </a>
      <a th:href="@{/bookings/movies}" class="nav-link">
        <i class="fas fa-arrow-left"></i> Back to Movies
      </a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="booking-header">
    <h1 class="movie-title" th:text="${showtime.movie.title}">Movie Title</h1>
    <div class="showtime-details">
      <i class="fas fa-clock"></i>
      <span th:text="${#temporals.format(showtime.showtime, 'EEEE, MMMM dd, yyyy - HH:mm')}">Date & Time</span>
    </div>
    <div class="theatre-info">
      <i class="fas fa-map-marker-alt"></i>
      <span th:text="${showtime.theatre.name}">Theatre Name</span> -
      <span th:text="${showtime.theatre.location}">Location</span>
    </div>
  </div>

  <div class="cinema-container">
    <div class="screen">
      <i class="fas fa-desktop"></i> SCREEN
    </div>

    <div class="seat-map" id="seatMap">
      <!-- Seats will be generated by JavaScript -->
    </div>

    <div class="seat-legend">
      <div class="legend-item">
        <div class="legend-seat available" style="background: #e8f5e8; border-color: #4caf50;"></div>
        <span>Available</span>
      </div>
      <div class="legend-item">
        <div class="legend-seat selected" style="background: linear-gradient(45deg, #667eea, #764ba2); border-color: #5a67d8;"></div>
        <span>Selected</span>
      </div>
      <div class="legend-item">
        <div class="legend-seat booked" style="background: #ffcccb; border-color: #f44336;"></div>
        <span>Booked</span>
      </div>
    </div>
  </div>

  <div class="booking-summary">
    <div class="summary-row">
      <span>Selected Seats:</span>
      <span class="selected-seats" id="selectedSeatsDisplay">None</span>
    </div>
    <div class="summary-row">
      <span>Number of Seats:</span>
      <span id="seatCount">0</span>
    </div>
    <div class="summary-row">
      <span>Price per Seat:</span>
      <span th:text="'₹' + ${seatPrice}">₹150</span>
    </div>
    <div class="summary-row total">
      <span>Total Amount:</span>
      <span id="totalAmount">₹0</span>
    </div>

    <form th:action="@{/bookings/confirm}" method="post" id="bookingForm">
      <input type="hidden" name="showtimeId" th:value="${showtime.id}">
      <input type="hidden" name="selectedSeats" id="selectedSeatsInput">
      <input type="hidden" name="totalAmount" id="totalAmountInput">

      <button type="submit" class="confirm-btn" id="confirmBtn" disabled>
        <i class="fas fa-check"></i> Confirm Booking
      </button>
    </form>
  </div>
</div>

<script th:inline="javascript">
  const bookedSeats = /*[[${bookedSeats}]]*/ [];
  const seatPrice = /*[[${seatPrice}]]*/ 150;
  let selectedSeats = [];

  // Generate seat layout
  function generateSeats() {
      const seatMap = document.getElementById('seatMap');
      const rows = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];

      rows.forEach(row => {
          const seatRow = document.createElement('div');
          seatRow.className = 'seat-row';

          // Row label
          const rowLabel = document.createElement('div');
          rowLabel.className = 'row-label';
          rowLabel.textContent = row;
          seatRow.appendChild(rowLabel);

          // Seats 1-4
          for (let seat = 1; seat <= 4; seat++) {
              const seatElement = createSeat(row + seat);
              seatRow.appendChild(seatElement);
          }

          // Aisle
          const aisle1 = document.createElement('div');
          aisle1.className = 'aisle';
          seatRow.appendChild(aisle1);

          // Seats 5-6
          for (let seat = 5; seat <= 6; seat++) {
              const seatElement = createSeat(row + seat);
              seatRow.appendChild(seatElement);
          }

          // Aisle
          const aisle2 = document.createElement('div');
          aisle2.className = 'aisle';
          seatRow.appendChild(aisle2);

          // Seats 7-10
          for (let seat = 7; seat <= 10; seat++) {
              const seatElement = createSeat(row + seat);
              seatRow.appendChild(seatElement);
          }

          seatMap.appendChild(seatRow);
      });
  }

  function createSeat(seatNumber) {
      const seat = document.createElement('button');
      seat.className = 'seat';
      seat.textContent = seatNumber;
      seat.type = 'button';

      if (bookedSeats.includes(seatNumber)) {
          seat.className += ' booked';
          seat.disabled = true;
      } else {
          seat.className += ' available';
          seat.addEventListener('click', () => toggleSeat(seatNumber, seat));
      }

      return seat;
  }

  function toggleSeat(seatNumber, seatElement) {
      const index = selectedSeats.indexOf(seatNumber);

      if (index > -1) {
          // Deselect seat
          selectedSeats.splice(index, 1);
          seatElement.className = 'seat available';
      } else {
          // Select seat (max 10 seats)
          if (selectedSeats.length < 10) {
              selectedSeats.push(seatNumber);
              seatElement.className = 'seat selected';
          } else {
              alert('You can select maximum 10 seats at a time.');
              return;
          }
      }

      updateSummary();
  }

  function updateSummary() {
      const seatCountElement = document.getElementById('seatCount');
      const selectedSeatsDisplay = document.getElementById('selectedSeatsDisplay');
      const totalAmountElement = document.getElementById('totalAmount');
      const confirmBtn = document.getElementById('confirmBtn');
      const selectedSeatsInput = document.getElementById('selectedSeatsInput');
      const totalAmountInput = document.getElementById('totalAmountInput');

      const seatCount = selectedSeats.length;
      const totalAmount = seatCount * seatPrice;

      seatCountElement.textContent = seatCount;
      selectedSeatsDisplay.textContent = seatCount > 0 ? selectedSeats.sort().join(', ') : 'None';
      totalAmountElement.textContent = '₹' + totalAmount;

      selectedSeatsInput.value = selectedSeats.join(',');
      totalAmountInput.value = totalAmount;

      confirmBtn.disabled = seatCount === 0;
  }

  // Initialize
  document.addEventListener('DOMContentLoaded', function() {
      generateSeats();
  });
</script>

</body>
</html>
