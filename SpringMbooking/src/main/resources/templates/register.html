<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <title>Register</title>
  <style>
    /* Specific styles for register.html if needed, otherwise rely on style.css */
    body { font-family: Arial; text-align: center; padding-top: 70px; background: #f2f2f2; }
    form { background: #fff; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px #ccc; }
    input { margin: 10px auto; padding: 10px; width: 250px; display: block; }
    /* Replaced .btn with common button style from style.css */
  </style>
</head>
<body>
<div class="container">
  <h2>Register as User</h2>
  <form th:action="@{/auth/register}" method="post">
    <label>Username:</label>
    <input type="text" name="username" placeholder="Username" required />

    <label>Email:</label>
    <input type="email" name="email" placeholder="Email" required />

    <label>Password:</label>
    <input type="password" name="password" placeholder="Password" required />

    <button type="submit">Register</button>
  </form>
  <div th:if="${error}" class="error-message" style="color: red; margin-top: 10px;">
    <p th:text="${error}"></p>
  </div>
</div>
</body>
</html>
