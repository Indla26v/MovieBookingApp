<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>User Management</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        min-height: 100vh;
    }
    .navbar {
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        padding: 1rem 2rem;
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
    }
    .nav-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1200px;
        margin: 0 auto;
    }
    .nav-links {
        display: flex;
        gap: 2rem;
    }
    .nav-link {
        color: #ffffff;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
        position: relative;
    }
    .nav-link:hover {
        color: #64b5f6;
        transform: translateY(-2px);
    }
    .nav-link::after {
        content: '';
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 0;
        height: 2px;
        background: #64b5f6;
        transition: width 0.3s ease;
    }
    .nav-link:hover::after {
        width: 100%;
    }
    .logout-btn {
        background: linear-gradient(45deg, #ff6b6b, #ee5a24);
        color: white;
        border: none;
        padding: 0.5rem 1.5rem;
        border-radius: 25px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
    }
    .logout-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(238, 90, 36, 0.4);
    }
    .container {
        max-width: 1200px;
        margin: 2rem auto;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        overflow: hidden;
    }
    .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        text-align: center;
        padding: 2rem;
    }
    .header h1 {
        margin: 0;
        font-size: 2.5rem;
        font-weight: 700;
    }
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        padding: 2rem;
        background: #f8f9fa;
    }
    .stat-card {
        background: white;
        padding: 1.5rem;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        transition: transform 0.3s ease;
    }
    .stat-card:hover {
        transform: translateY(-5px);
    }
    .stat-number {
        font-size: 2rem;
        font-weight: bold;
        color: #667eea;
        margin-bottom: 0.5rem;
    }
    .stat-label {
        color: #666;
        font-weight: 500;
    }
    .content {
        padding: 2rem;
    }
    .actions {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
    }
    .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-weight: 500;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s ease;
    }
    .btn-primary {
        background: linear-gradient(45deg, #667eea, #764ba2);
        color: white;
    }
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    .table-container {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }
    table {
        width: 100%;
        border-collapse: collapse;
    }
    th {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 1rem;
        text-align: left;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.9rem;
        letter-spacing: 0.5px;
    }
    td {
        padding: 1rem;
        border-bottom: 1px solid #eee;
        vertical-align: middle;
    }
    tr:hover {
        background: #f8f9fa;
    }
    .role-badge {
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 500;
        text-transform: uppercase;
    }
    .role-admin {
        background: #ff6b6b;
        color: white;
    }
    .role-manager {
        background: #4ecdc4;
        color: white;
    }
    .role-user {
        background: #45b7d1;
        color: white;
    }
    .action-btn {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 500;
        transition: all 0.3s ease;
        margin-right: 0.5rem;
    }
    .btn-edit {
        background: #feca57;
        color: #2c2c54;
    }
    .btn-delete {
        background: #ff6b6b;
        color: white;
    }
    .action-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
    }
    .alert {
        padding: 1rem;
        border-radius: 10px;
        margin-bottom: 1rem;
        font-weight: 500;
    }
    .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }
    .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }
    .search-box {
        width: 100%;
        padding: 1rem;
        border: 2px solid #eee;
        border-radius: 25px;
        font-size: 1rem;
        margin-bottom: 1rem;
        transition: border-color 0.3s ease;
    }
    .search-box:focus {
        outline: none;
        border-color: #667eea;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-content">
    <div class="nav-links">
      <a th:href="@{/}" class="nav-link">
        <i class="fas fa-home"></i> Home
      </a>
      <a th:href="@{/dashboard}" class="nav-link">
        <i class="fas fa-tachometer-alt"></i> Dashboard
      </a>
      <a th:href="@{/admin}" class="nav-link">
        <i class="fas fa-cog"></i> Admin Panel
      </a>
    </div>
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </form>
  </div>
</nav>

<div class="container">
  <div class="header">
    <h1><i class="fas fa-users"></i> User Management</h1>
    <p>Manage all system users and their roles</p>
  </div>

  <div class="stats-grid" th:if="${userStats}">
    <div class="stat-card">
      <div class="stat-number" th:text="${userStats.totalUsers}">0</div>
      <div class="stat-label">Total Users</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" th:text="${userStats.admins}">0</div>
      <div class="stat-label">Administrators</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" th:text="${userStats.managers}">0</div>
      <div class="stat-label">Managers</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" th:text="${userStats.regularUsers}">0</div>
      <div class="stat-label">Regular Users</div>
    </div>
  </div>

  <div class="content">
    <div th:if="${success}" class="alert alert-success">
      <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-error">
      <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
    </div>

    <div class="actions">
      <a th:href="@{/admin/register/admin}" class="btn btn-primary">
        <i class="fas fa-user-plus"></i> Add New Admin
      </a>
      <a th:href="@{/admin/register/manager}" class="btn btn-primary">
        <i class="fas fa-user-tie"></i> Add New Manager
      </a>
    </div>

    <input type="text" class="search-box" placeholder="Search users..." id="userSearch" onkeyup="filterUsers()">

    <div class="table-container">
      <table id="usersTable">
        <thead>
        <tr>
          <th><i class="fas fa-hashtag"></i> ID</th>
          <th><i class="fas fa-user"></i> Username</th>
          <th><i class="fas fa-envelope"></i> Email</th>
          <th><i class="fas fa-shield-alt"></i> Role</th>
          <th><i class="fas fa-calendar"></i> Created At</th>
          <th><i class="fas fa-cogs"></i> Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
          <td th:text="${user.id}"></td>
          <td th:text="${user.username}"></td>
          <td th:text="${user.email}"></td>
          <td>
                            <span class="role-badge"
                                  th:class="'role-badge role-' + ${#strings.toLowerCase(#strings.substring(user.role, 5))}"
                                  th:text="${#strings.substring(user.role, 5)}">
                            </span>
          </td>
          <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
          <td>
            <button class="action-btn btn-edit"
                    th:onclick="'showRoleModal(' + ${user.id} + ', \'' + ${user.username} + '\', \'' + ${user.role} + '\')'">
              <i class="fas fa-edit"></i> Edit Role
            </button>
            <form th:action="@{'/admin/users/' + ${user.id} + '/delete'}" method="post" style="display: inline;">
              <button type="submit" class="action-btn btn-delete"
                      onclick="return confirm('Are you sure you want to delete this user?')">
                <i class="fas fa-trash"></i> Delete
              </button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Role Update Modal -->
<div id="roleModal" class="modal" style="display: none;">
  <div class="modal-content">
    <span class="close-btn">&times;</span>
    <h2>Update User Role</h2>
    <form id="roleForm" method="post">
      <p>Update role for: <strong id="modalUsername"></strong></p>
      <select name="role" id="roleSelect" class="form-control">
        <option value="ROLE_USER">User</option>
        <option value="ROLE_MANAGER">Manager</option>
        <option value="ROLE_ADMIN">Admin</option>
      </select>
      <button type="submit" class="btn btn-primary">Update Role</button>
    </form>
  </div>
</div>

<style>
  .modal {
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
  }
  .modal-content {
      background-color: white;
      margin: 15% auto;
      padding: 2rem;
      border-radius: 15px;
      width: 400px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
  }
  .close-btn {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
  }
  .close-btn:hover {
      color: #000;
  }
  .form-control {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #eee;
      border-radius: 10px;
      margin: 1rem 0;
      font-size: 1rem;
  }
</style>

<script>
  function showRoleModal(userId, username, currentRole) {
      document.getElementById('roleModal').style.display = 'block';
      document.getElementById('modalUsername').textContent = username;
      document.getElementById('roleSelect').value = currentRole;
      document.getElementById('roleForm').action = '/admin/users/' + userId + '/update-role';
  }

  document.querySelector('.close-btn').onclick = function() {
      document.getElementById('roleModal').style.display = 'none';
  }

  window.onclick = function(event) {
      const modal = document.getElementById('roleModal');
      if (event.target == modal) {
          modal.style.display = 'none';
      }
  }

  function filterUsers() {
      const input = document.getElementById('userSearch');
      const filter = input.value.toLowerCase();
      const table = document.getElementById('usersTable');
      const rows = table.getElementsByTagName('tr');

      for (let i = 1; i < rows.length; i++) {
          const cells = rows[i].getElementsByTagName('td');
          let found = false;

          for (let j = 0; j < cells.length - 1; j++) {
              if (cells[j].textContent.toLowerCase().includes(filter)) {
                  found = true;
                  break;
              }
          }

          rows[i].style.display = found ? '' : 'none';
      }
  }
</script>

</body>
</html>
