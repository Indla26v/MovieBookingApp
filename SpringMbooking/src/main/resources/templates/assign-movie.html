<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Assign Movie to Theatre</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Assign Movie to Theatre</h1>

<form th:action="@{/auth/manager/assign}" method="post">
    <label for="movie">Select Movie:</label>
    <select id="movie" name="movieId" required>
        <option value="">-- Select --</option>
        <option th:each="movie : ${movies}" th:value="${movie.id}" th:text="${movie.title}"></option>
    </select>
    <br/><br/>

    <div th:if="${not singleTheatre}">
        <label for="theatre">Select Theatre:</label>
        <select id="theatre" name="theatreId" required>
            <option value="">-- Select --</option>
            <option th:each="theatre : ${theatres}" th:value="${theatre.id}" th:text="${theatre.name} + ' (' + ${theatre.location} + ')'"></option>
        </select>
    </div>

    <div th:if="${singleTheatre}">
        <input type="hidden" name="theatreId" th:value="${theatreId}" />
        <p>Theatre: <span th:text="${theatres[0].name}"></span></p>
    </div>

    <br/>

    <label for="showtime">Showtime:</label>
    <input type="datetime-local" id="showtime" name="showtime" required />
    <br/><br/>

    <button type="submit">Assign Movie</button>
</form>

<div th:if="${param.success}">
    <p class="success">Movie assigned successfully!</p>
</div>
</body>
</html>
